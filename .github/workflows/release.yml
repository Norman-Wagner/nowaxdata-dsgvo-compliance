name: Verify release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Validate versioned project
        run: |
          python scripts/build_portable_prompts.py --check
          python scripts/validate_repo.py
          python scripts/legal_watch.py --report /tmp/legal-watch-report.md
          python -m unittest discover -s tests -v
      - name: Match tag and plugin version
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          plugin = json.loads(Path(".codex-plugin/plugin.json").read_text(encoding="utf-8"))
          expected = "v" + plugin["version"]
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"Tag {actual!r} passt nicht zur Plugin-Version {expected!r}")
          print(f"Release-Version bestätigt: {actual}")
          PY
